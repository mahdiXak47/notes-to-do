# API traffic stays inside the cluster: browser → frontend pod → this proxy → backend Service.
# If your backend Service uses a different port than 8000, change the proxy_pass port only.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://notes-todo-core.mahdixak.svc.cluster.local:8000/api/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
