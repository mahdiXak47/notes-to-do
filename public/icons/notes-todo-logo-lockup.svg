<svg viewBox="0 0 420 80" xmlns="http://www.w3.org/2000/svg" width="420" height="80">
  <defs>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0047ab"/>
      <stop offset="100%" style="stop-color:#050557"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6ed8"/>
      <stop offset="100%" style="stop-color:#0047ab"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0047ab"/>
      <stop offset="100%" style="stop-color:#050557"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#050557" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ── Icon (scaled to 72×72, centered vertically) ── -->
  <g transform="translate(4, 4) scale(0.36)">
    <!-- Folder back -->
    <rect x="28" y="72" width="144" height="102" rx="10" fill="url(#folderGrad)" filter="url(#shadow)"/>
    <!-- Folder tab -->
    <path d="M28 72 Q28 60 38 60 L80 60 Q90 60 94 68 L100 78 L28 78 Z" fill="#0047ab"/>
    <path d="M28 72 Q28 60 38 60 L80 60 Q90 60 94 68 L100 78 L28 78 Z" fill="url(#shineGrad)"/>
    <!-- Folder shine -->
    <rect x="28" y="72" width="144" height="102" rx="10" fill="url(#shineGrad)"/>
    <!-- File body -->
    <g filter="url(#shadow)">
      <rect x="62" y="52" width="80" height="102" rx="7" fill="url(#fileGrad)"/>
      <path d="M118 52 L142 76 L118 76 Z" fill="#050557" opacity="0.35"/>
      <path d="M118 52 L142 76 L118 76 Z" fill="white" opacity="0.07"/>
      <rect x="62" y="52" width="80" height="50" rx="7" fill="url(#shineGrad)"/>
      <rect x="74" y="88" width="48" height="4" rx="2" fill="white" opacity="0.55"/>
      <rect x="74" y="100" width="38" height="4" rx="2" fill="white" opacity="0.4"/>
      <rect x="74" y="112" width="44" height="4" rx="2" fill="white" opacity="0.4"/>
      <rect x="74" y="124" width="30" height="4" rx="2" fill="white" opacity="0.3"/>
      <circle cx="82" cy="140" r="8" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
      <polyline points="78,140 81,143 87,136" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    </g>
  </g>

  <!-- ── Wordmark ── -->
  <!-- "notes" -->
  <text x="84" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="url(#textGrad)" letter-spacing="-0.5">notes</text>
  <!-- "todo" -->
  <text x="178" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#050557" letter-spacing="-0.5">todo</text>

  <!-- Tagline -->
  <text x="85" y="64" font-family="'Courier New', monospace" font-size="11" fill="#0047ab" opacity="0.6" letter-spacing="2">ORGANIZE · CAPTURE · DONE</text>
</svg>
